      delete pendingFrames[uuid];

      const relays = pendingRelays[uuid];

          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.

      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;

        const m = MARKER.exec(el.getAttribute('src') || '');

        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();

">シニアの毎日を、<br>もっとラクに、もっと楽しく。<\u002Fh1>\n      <p style=\"margin:0; font-size:18px; max-width:560px; color:#33333A; text-shadow:0 1px 10px rgba(255,255,255,0.3);\">タブレットやパソコンの使い方から、暮らしのちょっとした困りごとまで。<br>やさしい言葉でお伝えする、ロイさんの発信をまとめました。<\u002Fp>\n    <\u002Fdiv>\n    <svg sc-camel-view-box=\"0 0 880 140\" sc-camel-preserve-aspect-ratio=\"none\" style=\"position:relative; display:block; width:100%; height:130px; margin-top:36px; z-index:1;\">\n      <path d=\"M0,90 L110,55 L200,80 L260,48 L340,86 L400,60 L470,90 L0,90 Z\" fill=\"#2F5240\" opacity=\"0.6\"><\u002Fpath>\n      <path d=\"M120,110 L250,72 L360,100 L470,66 L600,104 L720,78 L880,108 L880,140 L0,140 L0,120 Z\" fill=\"#20392C\" opacity=\"0.9\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fsection>\n\n  <!-- ①.5 教材紹介 -->\n  <section id=\"course\" data-screen-label=\"教材紹介\" style=\"padding:56px 24px; scroll-margin-top:96px;\">\n    <div class=\"course-grid\" style=\"max-width:880px; margin:0 auto; background:#FFFFFF; border:1px solid #D7E6EA; border-radius:24px; padding:36px; display:grid; gap:32px; align-items:center; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n      <img src=\"image/course-cover.jpg\" alt=\"教材「はじめてのスマホ教室」の表紙\" style=\"width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:18px; display:block;\">\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <span style=\"display:inline-block; align-self:flex-start; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; background:#E1F0F3; color:#1F5A72;\">教材のご紹介<\u002Fspan>\n        <h2 style=\"margin:0; font-size:24px; color:#1F5A72; font-weight:900;\">はじめてのスマホ教室<\u002Fh2>\n        <p style=\"margin:0; font-size:15px; color:#33505A;\">「電源の入れ方から、写真の送り方、LINEの使い方まで」。スマホがはじめての方でも迷わず進められるよう、順を追って動画とテキストでやさしく解説する教材です。<\u002Fp>\n        <div style=\"display:flex; gap:12px; margin-top:6px;\">\n          <a href=\"material/hajimete-no-sumaho-kyoshitsu.html\" style=\"flex:1; text-align:center; padding:13px 18px; background:#1F5A72; color:#fff; border-radius:999px; text-decoration:none; font-weight:700; font-size:15px; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.35);\">教材を今すぐ見る<\u002Fa>\n          <a href=\"#contact\" style=\"flex:1; text-align:center; padding:13px 18px; background:#FFFFFF; color:#1F5A72; border:1px solid #1F5A72; border-radius:999px; text-decoration:none; font-weight:700; font-size:15px; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.2);\">くわしく問い合わせる<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"kouza\" data-screen-label=\"講座動画\" style=\"padding:56px 24px; background:#EAF3F6; scroll-margin-top:96px;\">\n    <div style=\"max-width:880px; margin:0 auto;\">\n      <div style=\"text-align:center; margin-bottom:28px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; background:#FFFFFF; color:#1F5A72; border:1px solid #D7E6EA;\">動画で学べるミニ講座<\u002Fspan>\n        <h2 style=\"margin:12px 0 8px; font-size:26px; color:#1F5A72; font-weight:900;\">講座動画（全7回）<\u002Fh2>\n        <p style=\"margin:0; font-size:15px; color:#33505A; line-height:1.8;\">田舎にいながら、自分の得意を売り物に変えるまでの道のりを全7回で解説しています。<br>フルテロップ字幕つきなので、音を出せない場所でもご覧いただけます。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:24px; padding:24px; margin-bottom:24px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; background:#F8E3C4; color:#7A5A2E;\">まずはこちら<\u002Fspan>\n        <h3 style=\"margin:10px 0 12px; font-size:20px; color:#1F5A72; font-weight:900;\">第0回　予告編<\u002Fh3>\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep0.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:16px; background:#000; display:block;\"><\u002Fvideo>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px;\">\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep1.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第1回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">田舎は不利じゃない<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep2.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第2回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">稼ぐ仕組みは3段階<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep3.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第3回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">売り物の見つけ方<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep4.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第4回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">収入の柱を3本立てる<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep5.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第5回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">売るときの基本ルール5つ<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; padding:16px; box-shadow:0 4px 16px rgba(31,90,114,0.06);\">\n        <video controls preload=\"metadata\" src=\"videos/kouza_ep6.mp4\" style=\"width:100%; aspect-ratio:16/9; border-radius:12px; background:#000; display:block;\"><\u002Fvideo>\n        <p style=\"margin:12px 0 2px; font-size:13px; font-weight:700; color:#C67A73;\">第6回<\u002Fp>\n        <p style=\"margin:0; font-size:16px; font-weight:700; color:#1F5A72;\">最初の90日でやること<\u002Fp>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ② 3つの窓口カード -->\n  <section data-screen-label=\"② 窓口カード\" style=\"padding:16px 24px 64px;\">\n    <div style=\"max-width:880px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px;\">\n\n      <div id=\"note\" style=\"scroll-margin-top:96px; background:#FFFFFF; border:1px solid #D7E6EA; border-radius:20px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; box-shadow:0 4px 16px rgba(31,90,114,0.08);\">\n        <div style=\"width:56px; height:56px; border-radius:16px; background:#E1F0F3; display:flex; align-items:center; justify-content:center; font-size:26px;\">📖<\u002Fdiv>\n        <h3 style=\"margin:0; font-size:20px; color:#1F5A72; font-weight:700;\">noteを読む<\u002Fh3>\n        <p style=\"margin:0; font-size:15px; color:#55747C;\">スマホ・パソコンの使い方を、やさしい文章でじっくり解説しています。<\u002Fp>\n        <a href=\"https://note.com/roy_s1105\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:auto; width:100%; box-sizing:border-box; padding:14px 0; background:#1F5A72; color:#fff; border-radius:999px; text-decoration:none; font-weight:700; font-size:15px; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.35);\">note記事を読む<\u002Fa>\n      <\u002Fdiv>\n\n      <div id=\"youtube\" style=\"scroll-margin-top:96px; background:#FFFFFF; border:1px solid #D7E6EA; border-radius:20px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; box-shadow:0 4px 16px rgba(31,90,114,0.08);\">\n        <div style=\"width:56px; height:56px; border-radius:16px; background:#E1F0F3; display:flex; align-items:center; justify-content:center; font-size:26px;\">▶️<\u002Fdiv>\n        <h3 style=\"margin:0; font-size:20px; color:#1F5A72; font-weight:700;\">YouTubeを見る<\u002Fh3>\n        <p style=\"margin:0; font-size:15px; color:#55747C;\">ガジェットや日用品を実際に使ったレビュー動画をお届けしています。<\u002Fp>\n        <a href=\"https://www.youtube.com/@royschannel9208\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:auto; width:100%; box-sizing:border-box; padding:14px 0; background:#1F5A72; color:#fff; border-radius:999px; text-decoration:none; font-weight:700; font-size:15px; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.35);\">YouTubeを見る<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"scroll-margin-top:96px; background:#FFFFFF; border:1px solid #D7E6EA; border-radius:20px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; box-shadow:0 4px 16px rgba(31,90,114,0.08);\">\n        <div style=\"width:56px; height:56px; border-radius:16px; background:#E1F0F3; display:flex; align-items:center; justify-content:center; font-size:26px;\">💬<\u002Fdiv>\n        <h3 style=\"margin:0; font-size:20px; color:#1F5A72; font-weight:700;\">相談する<\u002Fh3>\n        <p style=\"margin:0; font-size:15px; color:#55747C;\">お仕事のご依頼や、個別のご相談はこちらから受け付けています。<\u002Fp>\n        <a href=\"#contact\" style=\"margin-top:auto; width:100%; box-sizing:border-box; padding:14px 0; background:#1F5A72; color:#fff; border-radius:999px; text-decoration:none; font-weight:700; font-size:15px; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.35);\">お問い合わせへ<\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ③ 自己紹介・実績 -->\n  <section data-screen-label=\"③ 自己紹介・実績\" style=\"padding:56px 24px; background:#E8F1E6;\">\n    <div class=\"profile-grid\" style=\"max-width:880px; margin:0 auto; display:grid; gap:40px; align-items:start;\">\n      <img src=\"image/profile-photo.jpg\" alt=\"プロフィール写真\" style=\"width:100%; aspect-ratio:1; object-fit:cover; object-position:50% 30%; border-radius:20px; box-shadow:0 6px 18px rgba(31,90,114,0.16); display:block;\">\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div>\n          <h2 style=\"margin:0 0 8px; font-size:26px; color:#1F5A72; font-weight:900;\">はじめまして、ロイです<\u002Fh2>\n          <p style=\"margin:0; font-size:16px; color:#33505A;\">61歳、香川県三豊市在住。むずかしい言葉を使わず、実際に使ってわかったことをお伝えするのを大切にしています。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:16px; flex-wrap:wrap;\">\n          <div style=\"background:#FFFFFF; border-radius:16px; padding:18px 22px; flex:1; min-width:150px; border:1px solid #D7E6EA;\">\n            <div style=\"font-size:26px; font-weight:900; color:#1F5A72;\">{{ avgViewsDisplay }}<\u002Fdiv>\n            <div style=\"font-size:13px; color:#55747C;\">1日平均の視聴回数<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border-radius:16px; padding:18px 22px; flex:1; min-width:150px; border:1px solid #D7E6EA;\">\n            <div style=\"font-size:26px; font-weight:900; color:#1F5A72;\">{{ totalClicksDisplay }}<\u002Fdiv>\n            <div style=\"font-size:13px; color:#55747C;\">動画教材の総クリック数<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border-radius:16px; padding:20px 22px; border:1px solid #D7E6EA; font-size:15px; color:#33505A;\">\n          <span style=\"color:#8FB0B8;\">「<\u002Fspan>note読者の声（あとで差し替え）<span style=\"color:#8FB0B8;\">」<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ④ こんな記事・動画があります -->\n  <section data-screen-label=\"④ 記事・動画紹介\" style=\"padding:56px 24px;\">\n    <div style=\"max-width:880px; margin:0 auto;\">\n      <h2 style=\"margin:0 0 8px; font-size:26px; color:#1F5A72; font-weight:900; text-align:center;\">こんな記事・動画があります<\u002Fh2>\n      <p style=\"margin:0 0 32px; text-align:center; font-size:15px; color:#55747C;\">人気のテーマをいくつかご紹介します<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ contentCards }}\" as=\"card\" hint-placeholder-count=\"6\">\n          <div style=\"background:#FFFFFF; border:1px solid #D7E6EA; border-radius:18px; overflow:hidden; box-shadow:0 4px 14px rgba(31,90,114,0.08);\">\n            <image-slot id=\"{{ card.id }}\" style=\"width:100%; height:130px;\" shape=\"rect\" placeholder=\"{{ card.placeholder }}\"><\u002Fimage-slot>\n            <div style=\"padding:16px 18px;\">\n              <span style=\"display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; background:{{ card.tagBg }}; color:{{ card.tagColor }};\">{{ card.tag }}<\u002Fspan>\n              <h3 style=\"margin:10px 0 0; font-size:16px; color:#1F333B; font-weight:700;\">{{ card.title }}<\u002Fh3>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑤ もう一つの顔 -->\n  <section data-screen-label=\"⑤ もう一つの顔\" style=\"padding:56px 24px; background:#E8F1E6;\">\n    <div style=\"max-width:880px; margin:0 auto;\">\n      <h2 style=\"margin:0 0 32px; font-size:26px; color:#1F5A72; font-weight:900; text-align:center;\">もう一つの顔<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px;\">\n        <div style=\"background:#FFFFFF; border-radius:20px; overflow:hidden; border:1px solid #D7E6EA; display:flex; flex-direction:column;\">\n          <image-slot id=\"bound-tennis\" style=\"width:100%; height:160px;\" shape=\"rect\" placeholder=\"バウンドテニスの写真\"><\u002Fimage-slot>\n          <div style=\"padding:20px 22px;\">\n            <h3 style=\"margin:0 0 8px; font-size:17px; color:#1F5A72; font-weight:700;\">バウンドテニス普及活動<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#55747C;\">香川県バウンドテニス協会で、大会運営のお手伝いをしています。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border-radius:20px; overflow:hidden; border:1px solid #D7E6EA; display:flex; flex-direction:column;\">\n          <image-slot id=\"hobby\" style=\"width:100%; height:160px;\" shape=\"rect\" placeholder=\"バイク・キャンプの写真\"><\u002Fimage-slot>\n          <div style=\"padding:20px 22px;\">\n            <h3 style=\"margin:0 0 8px; font-size:17px; color:#1F5A72; font-weight:700;\">バイク・キャンプ<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#55747C;\">休みの日は、バイクでのツーリングやキャンプを楽しんでいます。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ⑥ お問い合わせ -->\n  <section id=\"contact\" data-screen-label=\"⑥ お問い合わせ\" style=\"padding:64px 24px; scroll-margin-top:70px;\">\n    <div style=\"max-width:560px; margin:0 auto;\">\n      <h2 style=\"margin:0 0 8px; font-size:26px; color:#1F5A72; font-weight:900; text-align:center;\">お問い合わせ<\u002Fh2>\n      <p style=\"margin:0 0 32px; text-align:center; font-size:15px; color:#55747C;\">ご相談やお仕事のご依頼は、こちらのフォームからお気軽にどうぞ。<\u002Fp>\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#E1F0F3; border-radius:18px; padding:36px 28px; text-align:center;\">\n          <div style=\"font-size:34px; margin-bottom:10px;\">🌊<\u002Fdiv>\n          <h3 style=\"margin:0 0 6px; color:#1F5A72; font-size:19px;\">送信ありがとうございます<\u002Fh3>\n          <p style=\"margin:0; font-size:14px; color:#33505A;\">内容を確認して、ロイさんより折り返しご連絡いたします。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form sc-camel-on-submit=\"{{ handleSubmit }}\" style=\"display:flex; flex-direction:column; gap:18px; background:#FFFFFF; border:1px solid #D7E6EA; border-radius:20px; padding:32px 28px;\">\n          <label style=\"display:flex; flex-direction:column; gap:6px; font-size:14px; color:#33505A; font-weight:500;\">\n            お名前\n            <input type=\"text\" value=\"{{ formName }}\" sc-camel-on-change=\"{{ onNameChange }}\" placeholder=\"山田 花子\" style=\"padding:12px 14px; border-radius:12px; border:1px solid #C9DEE3; font-size:15px; font-family:inherit;\">\n          <\u002Flabel>\n          <label style=\"display:flex; flex-direction:column; gap:6px; font-size:14px; color:#33505A; font-weight:500;\">\n            メールアドレス\n            <input type=\"email\" value=\"{{ formEmail }}\" sc-camel-on-change=\"{{ onEmailChange }}\" placeholder=\"example@mail.com\" style=\"padding:12px 14px; border-radius:12px; border:1px solid #C9DEE3; font-size:15px; font-family:inherit;\">\n          <\u002Flabel>\n          <label style=\"display:flex; flex-direction:column; gap:6px; font-size:14px; color:#33505A; font-weight:500;\">\n            お問い合わせ内容\n            <textarea value=\"{{ formMessage }}\" sc-camel-on-change=\"{{ onMessageChange }}\" placeholder=\"ご相談内容やご依頼の内容をお書きください\" rows=\"5\" style=\"padding:12px 14px; border-radius:12px; border:1px solid #C9DEE3; font-size:15px; font-family:inherit; resize:vertical;\"><\u002Ftextarea>\n          <\u002Flabel>\n          <sc-if value=\"{{ formError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"color:#B23B3B; font-size:13px;\">{{ formError }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button type=\"submit\" style=\"padding:15px 0; background:#1F5A72; color:#fff; border:none; border-radius:999px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform:translateY(-4px); box-shadow:0 8px 18px rgba(31,90,114,0.35);\">{{ submitLabel }}<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:32px 24px 48px; text-align:center; font-size:13px; color:#6E8790; border-top:1px solid #D7E6EA;\">\n    <div style=\"display:flex; justify-content:center; gap:20px; margin-bottom:12px; font-size:14px;\">\n      <a href=\"#course\" style=\"color:#1F5A72; text-decoration:none;\" style-hover=\"font-weight:700; text-decoration:underline !important; text-underline-offset:3px;\">教材<\u002Fa>\n      <a href=\"https://note.com/roy_s1105\" target=\"_blank\" rel=\"noopener\" style=\"color:#1F5A72; text-decoration:none;\" style-hover=\"font-weight:700; text-decoration:underline !important; text-underline-offset:3px;\">note<\u002Fa>\n      <a href=\"https://www.youtube.com/@royschannel9208\" target=\"_blank\" rel=\"noopener\" style=\"color:#1F5A72; text-decoration:none;\" style-hover=\"font-weight:700; text-decoration:underline !important; text-underline-offset:3px;\">YouTube<\u002Fa>\n      <a href=\"#contact\" style=\"color:#1F5A72; text-decoration:none;\" style-hover=\"font-weight:700; text-decoration:underline !important; text-underline-offset:3px;\">お問い合わせ<\u002Fa>\n    <\u002Fdiv>\n    © 2026 うどん県発！ITシニアなんでも相談室 -<span style=\"font-family:'Baloo 2',cursive;\">by Roy's Channel<\u002Fspan>-\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    menuOpen: false,\n    formName: '',\n    formEmail: '',\n    formMessage: '',\n    formError: '',\n    submitted: false,\n    sending: false,\n    statsLoaded: false,\n    avgPerDay: 0,\n    totalClicks: 0,\n  };\n\n  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n  closeMenu = () => this.setState({ menuOpen: false });\n\n  componentDidMount() {\n    var base = window.__ROY_API_BASE__;\n    if (!base) return;\n    fetch(base + '/stats')\n      .then((res) => res.json())\n      .then((data) => {\n        if (data && data.ok) {\n          this.setState({ statsLoaded: true, avgPerDay: data.avgPerDay, totalClicks: data.total });\n        }\n      })\n      .catch(() => {});\n  }\n\n  onNameChange = (e) => this.setState({ formName: e.target.value });\n  onEmailChange = (e) => this.setState({ formEmail: e.target.value });\n  onMessageChange = (e) => this.setState({ formMessage: e.target.value });\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    const { formName, formEmail, formMessage } = this.state;\n    if (!formName.trim() || !formEmail.trim() || !formMessage.trim()) {\n      this.setState({ formError: 'すべての項目をご記入ください。' });\n      return;\n    }\n    this.setState({ formError: '', sending: true });\n    fetch((window.__ROY_API_BASE__ || '') + '/contact', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ name: formName, email: formEmail, message: formMessage }),\n    })\n      .then((res) => res.json())\n      .then((data) => {\n        if (data && data.ok) {\n          this.setState({ sending: false, submitted: true });\n        } else {\n          this.setState({ sending: false, formError: '送信に失敗しました。しばらくしてからもう一度お試しください。' });\n        }\n      })\n      .catch(() => {\n        this.setState({ sending: false, formError: '送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。' });\n      });\n  };\n\n  contentCards = [\n    { id: 'card-1', tag: 'YouTube', tagBg: '#FDEDEA', tagColor: '#C1533F', title: 'タブレットの選び方', placeholder: 'タブレットの写真' },\n    { id: 'card-2', tag: 'note', tagBg: '#E1F0F3', tagColor: '#1F5A72', title: 'スマホの困りごと解決', placeholder: 'スマホ操作の写真' },\n    { id: 'card-3', tag: 'YouTube', tagBg: '#FDEDEA', tagColor: '#C1533F', title: 'パソコン周辺機器レビュー', placeholder: 'PC周辺機器の写真' },\n    { id: 'card-4', tag: 'note', tagBg: '#E1F0F3', tagColor: '#1F5A72', title: '家族とのコミュニケーション', placeholder: '家族団らんの写真' },\n    { id: 'card-5', tag: 'YouTube', tagBg: '#FDEDEA', tagColor: '#C1533F', title: 'ドローンを使ってみた', placeholder: 'ドローンの写真' },\n    { id: 'card-6', tag: 'note', tagBg: '#E1F0F3', tagColor: '#1F5A72', title: '暮らしとお金の話', placeholder: '暮らしの写真' },\n  ];\n\n  renderVals() {\n    return {\n      menuOpen: this.state.menuOpen,\n      menuIcon: this.state.menuOpen ? '✕' : '☰',\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      contentCards: this.contentCards,\n      formName: this.state.formName,\n      formEmail: this.state.formEmail,\n      formMessage: this.state.formMessage,\n      formError: this.state.formError,\n      submitted: this.state.submitted,\n      submitLabel: this.state.sending ? '送信中…' : '送信する',\n      avgViewsDisplay: this.state.statsLoaded ? (this.state.avgPerDay + '回') : '—',\n      totalClicksDisplay: this.state.statsLoaded ? (this.state.totalClicks + '回') : '—',\n      notSubmitted: !this.state.submitted,\n      onNameChange: this.onNameChange,\n      onEmailChange: this.onEmailChange,\n      onMessageChange: this.onMessageChange,\n      handleSubmit: this.handleSubmit,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<script>\n(function () {\n  function fixVideoControls() {\n    var vids = document.querySelectorAll('#kouza video');\n    for (var i = 0; i < vids.length; i++) {\n      if (!vids[i].controls) { vids[i].controls = true; }\n    }\n  }\n  fixVideoControls();\n  setInterval(fixVideoControls, 400);\n})();\n<\u002Fscript>\n\n<script>\n(function () {\n  function trackPlay(el) {\n    if (el.dataset.tracked === '1') return;\n    el.dataset.tracked = '1';\n    var base = window.__ROY_API_BASE__;\n    if (!base) return;\n    var src = el.getAttribute('src') || '';\n    var match = src.match(/([a-zA-Z0-9_-]+)\\.mp4/);\n    var id = match ? match[1] : 'unknown';\n    fetch(base + '/track', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ video: id }),\n    }).catch(function () {});\n  }\n  function attachTracking() {\n    var vids = document.querySelectorAll('#kouza video');\n    for (var i = 0; i < vids.length; i++) {\n      if (vids[i].dataset.trackingAttached === '1') continue;\n      vids[i].dataset.trackingAttached = '1';\n      vids[i].addEventListener('play', function (ev) { trackPlay(ev.target); });\n    }\n  }\n  attachTracking();\n  setInterval(attachTracking, 400);\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
